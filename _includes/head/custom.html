<style>
/* =========================================================
   Mahdi Hejrati personal academic website theme
   Custom theme for Academic Pages / Minimal Mistakes
   ========================================================= */

:root {
  --mh-bg: #f7f9fc;
  --mh-card: #ffffff;
  --mh-text: #172033;
  --mh-muted: #5d6b82;
  --mh-blue: #0b4f8a;
  --mh-cyan: #0aa6b7;
  --mh-gold: #d89b22;
  --mh-border: #dce4ef;
  --mh-shadow: 0 10px 30px rgba(20, 40, 80, 0.08);
}

/* General page feel */
body {
  background: var(--mh-bg);
  color: var(--mh-text);
  font-size: 17px;
  line-height: 1.72;
}

/* Main content card */
.page {
  background: var(--mh-card);
  border: 1px solid var(--mh-border);
  border-radius: 18px;
  box-shadow: var(--mh-shadow);
  padding: 2.2rem;
}

/* Stronger academic title style */
.page__title {
  color: var(--mh-blue);
  font-weight: 800;
  letter-spacing: -0.03em;
}

/* Links */
a {
  color: var(--mh-blue);
  text-decoration: none;
}

a:hover {
  color: var(--mh-cyan);
  text-decoration: underline;
}

/* Sidebar author card */
.author__avatar img {
  border-radius: 50%;
  border: 4px solid #ffffff;
  box-shadow: 0 8px 26px rgba(0, 0, 0, 0.16);
}

.author__content {
  background: linear-gradient(145deg, #ffffff, #eef5fb);
  border: 1px solid var(--mh-border);
  border-radius: 16px;
  padding: 1rem;
  box-shadow: var(--mh-shadow);
}

.author__name {
  color: var(--mh-blue);
  font-weight: 800;
}

.author__bio {
  color: var(--mh-muted);
  font-size: 0.92rem;
}

/* Navigation */
.greedy-nav {
  background: #ffffff;
  border-bottom: 1px solid var(--mh-border);
}

.greedy-nav a {
  color: var(--mh-text);
  font-weight: 600;
}

.greedy-nav a:hover {
  color: var(--mh-blue);
}

/* Section headings */
.page__content h2 {
  color: var(--mh-blue);
  border-bottom: 2px solid var(--mh-border);
  padding-bottom: 0.35rem;
  margin-top: 2.2rem;
}

.page__content h3 {
  color: var(--mh-text);
  margin-top: 1.6rem;
}

/* Highlight boxes */
.research-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 1rem;
  margin: 1.5rem 0;
}

.research-card {
  background: linear-gradient(145deg, #ffffff, #f1f7fb);
  border: 1px solid var(--mh-border);
  border-left: 5px solid var(--mh-blue);
  border-radius: 14px;
  padding: 1.1rem;
  box-shadow: 0 8px 22px rgba(20, 40, 80, 0.06);
}

.research-card h3 {
  margin-top: 0;
  color: var(--mh-blue);
  font-size: 1.05rem;
}

.research-card p {
  color: var(--mh-muted);
  font-size: 0.95rem;
}

/* Timeline */
.timeline {
  border-left: 3px solid var(--mh-blue);
  margin: 1.5rem 0 1.5rem 0.5rem;
  padding-left: 1.3rem;
}

.timeline-item {
  position: relative;
  margin-bottom: 1.4rem;
}

.timeline-item::before {
  content: "";
  position: absolute;
  left: -1.72rem;
  top: 0.35rem;
  width: 0.75rem;
  height: 0.75rem;
  background: var(--mh-gold);
  border-radius: 50%;
  border: 3px solid #ffffff;
  box-shadow: 0 0 0 2px var(--mh-blue);
}

.timeline-item strong {
  color: var(--mh-blue);
}

/* Buttons */
.mh-button {
  display: inline-block;
  padding: 0.65rem 1rem;
  margin: 0.25rem 0.35rem 0.25rem 0;
  border-radius: 999px;
  background: var(--mh-blue);
  color: #ffffff !important;
  font-weight: 700;
  box-shadow: 0 6px 18px rgba(11, 79, 138, 0.25);
}

.mh-button:hover {
  background: var(--mh-cyan);
  color: #ffffff !important;
  text-decoration: none;
}

/* Publication/project lists */
.archive__item-title {
  color: var(--mh-blue);
}

.archive__item-excerpt {
  color: var(--mh-muted);
}

/* Mobile */
@media screen and (max-width: 768px) {
  .page {
    padding: 1.2rem;
    border-radius: 12px;
  }

  body {
    font-size: 16px;
  }
}
</style>
